    <circle cx="0" cy="0" r="38" fill="none" stroke="white" stroke-width="2.5" opacity="0.8"/>
    <circle cx="0" cy="0" r="16" fill="#D42918" opacity="0.9"/>
    <circle cx="6" cy="-6" r="5" fill="white" opacity="0.4"/>
  </g>
  <!-- Warning triangle above -->
  <g transform="translate(600,170)">
    <path d="M0 -35 L32 20 L-32 20 Z" fill="#D42918" opacity="0.3"/>
    <path d="M0 -35 L32 20 L-32 20 Z" fill="none" stroke="white" stroke-width="2.5"/>
    <line x1="0" y1="-18" x2="0" y2="4" stroke="white" stroke-width="3"/>
    <circle cx="0" cy="12" r="3" fill="white"/>
  </g>
  <!-- Data scatter -->
  <g opacity="0.15">
    <circle cx="180" cy="150" r="3" fill="#D42918"/>
    <circle cx="320" cy="480" r="2.5" fill="#D42918"/>
    <circle cx="850" cy="120" r="3" fill="#D42918"/>
    <circle cx="950" cy="400" r="2" fill="#D42918"/>
    <circle cx="420" cy="530" r="2.5" fill="#D42918"/>
    <circle cx="780" cy="510" r="3" fill="#D42918"/>
    <circle cx="150" cy="350" r="2" fill="#D42918"/>
    <circle cx="1050" cy="250" r="2.5" fill="#D42918"/>
    <circle cx="250" cy="90" r="2" fill="#D42918"/>
    <circle cx="1000" cy="550" r="3" fill="#D42918"/>
