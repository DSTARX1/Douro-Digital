<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#1e40af"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#D42918;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#D42918;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="600" cy="315" r="300" fill="url(#glow)"/>
  <!-- Grid -->
  <g opacity="0.08" stroke="white" stroke-width="0.5">
    <line x1="0" y1="105" x2="1200" y2="105"/><line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
  <!-- Form/clipboard -->
  <g transform="translate(600,300)">
    <rect x="-110" y="-160" width="220" height="300" rx="10" fill="rgba(255,255,255,0.05)" stroke="white" stroke-width="2.5"/>
    <rect x="-40" y="-175" width="80" height="30" rx="6" fill="#1e3a5f" stroke="white" stroke-width="2"/>
    <!-- Form lines -->
    <line x1="-75" y1="-100" x2="-20" y2="-100" stroke="white" stroke-width="2" opacity="0.7"/>
    <line x1="-75" y1="-60" x2="75" y2="-60" stroke="white" stroke-width="2" opacity="0.5"/>
    <line x1="-75" y1="-25" x2="75" y2="-25" stroke="white" stroke-width="2" opacity="0.5"/>
    <line x1="-75" y1="10" x2="40" y2="10" stroke="white" stroke-width="2" opacity="0.5"/>
    <line x1="-75" y1="45" x2="75" y2="45" stroke="white" stroke-width="2" opacity="0.5"/>
    <line x1="-75" y1="80" x2="55" y2="80" stroke="white" stroke-width="2" opacity="0.5"/>
    <!-- Checkmarks -->
    <path d="M80 -65 L87 -58 L98 -72" fill="none" stroke="#D42918" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M80 -30 L87 -23 L98 -37" fill="none" stroke="#D42918" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M80 5 L87 12 L98 -2" fill="none" stroke="#D42918" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- Lock overlay -->
  <g transform="translate(760,200)">
    <rect x="-22" y="0" width="44" height="34" rx="5" fill="#D42918" opacity="0.9"/>
    <path d="M-13 0 L-13 -16 Q-13 -32 0 -32 Q13 -32 13 -16 L13 0" fill="none" stroke="white" stroke-width="2.5"/>
    <circle cx="0" cy="14" r="5" fill="white"/>
  </g>
  <rect x="0" y="0" width="5" height="630" fill="#D42918"/>
</svg>