<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b0764"/>
      <stop offset="100%" style="stop-color:#581c87"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#D42918;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#D42918;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="600" cy="315" r="300" fill="url(#glow)"/>
  <!-- Grid -->
  <g opacity="0.08" stroke="white" stroke-width="0.5">
    <line x1="0" y1="105" x2="1200" y2="105"/><line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
  <!-- Network nodes and connections -->
  <g>
    <!-- Connections first (behind nodes) -->
    <line x1="600" y1="315" x2="400" y2="190" stroke="white" stroke-width="2" opacity="0.35"/>
    <line x1="600" y1="315" x2="800" y2="190" stroke="white" stroke-width="2" opacity="0.35"/>
    <line x1="600" y1="315" x2="400" y2="440" stroke="white" stroke-width="2" opacity="0.35"/>
    <line x1="600" y1="315" x2="800" y2="440" stroke="white" stroke-width="2" opacity="0.35"/>
    <line x1="600" y1="315" x2="280" y2="315" stroke="white" stroke-width="1.5" opacity="0.25"/>
    <line x1="600" y1="315" x2="920" y2="315" stroke="white" stroke-width="1.5" opacity="0.25"/>
    <line x1="400" y1="190" x2="280" y2="315" stroke="white" stroke-width="1" opacity="0.2"/>
    <line x1="800" y1="190" x2="920" y2="315" stroke="white" stroke-width="1" opacity="0.2"/>
    <line x1="400" y1="440" x2="280" y2="315" stroke="white" stroke-width="1" opacity="0.2"/>
    <line x1="800" y1="440" x2="920" y2="315" stroke="white" stroke-width="1" opacity="0.2"/>
    <line x1="400" y1="190" x2="310" y2="130" stroke="white" stroke-width="1" opacity="0.2"/>
    <line x1="800" y1="190" x2="890" y2="130" stroke="white" stroke-width="1" opacity="0.2"/>
    <!-- Center node -->
    <circle cx="600" cy="315" r="18" fill="#D42918" opacity="0.9"/>
    <circle cx="600" cy="315" r="18" fill="none" stroke="white" stroke-width="2"/>
    <!-- Primary nodes -->
    <circle cx="400" cy="190" r="12" fill="#D42918" opacity="0.7"/>
    <circle cx="400" cy="190" r="12" fill="none" stroke="white" stroke-width="2"/>
    <circle cx="800" cy="190" r="12" fill="#D42918" opacity="0.7"/>
    <circle cx="800" cy="190" r="12" fill="none" stroke="white" stroke-width="2"/>
    <circle cx="400" cy="440" r="12" fill="#D42918" opacity="0.7"/>
    <circle cx="400" cy="440" r="12" fill="none" stroke="white" stroke-width="2"/>
    <circle cx="800" cy="440" r="12" fill="#D42918" opacity="0.7"/>
    <circle cx="800" cy="440" r="12" fill="none" stroke="white" stroke-width="2"/>
    <!-- Secondary nodes -->
    <circle cx="280" cy="315" r="8" fill="white" opacity="0.5"/>
    <circle cx="920" cy="315" r="8" fill="white" opacity="0.5"/>
    <circle cx="310" cy="130" r="6" fill="white" opacity="0.35"/>
    <circle cx="890" cy="130" r="6" fill="white" opacity="0.35"/>
  </g>
  <rect x="0" y="0" width="5" height="630" fill="#D42918"/>
</svg>