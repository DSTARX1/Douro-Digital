<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c4a6e"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#D42918;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#D42918;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="600" cy="315" r="300" fill="url(#glow)"/>
  <!-- Grid -->
  <g opacity="0.08" stroke="white" stroke-width="0.5">
    <line x1="0" y1="105" x2="1200" y2="105"/><line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
  <!-- Sound waves -->
  <g transform="translate(600,315)">
    <circle cx="0" cy="0" r="90" fill="none" stroke="#D42918" stroke-width="3" opacity="0.9"/>
    <circle cx="0" cy="0" r="150" fill="none" stroke="#D42918" stroke-width="2.5" opacity="0.6"/>
    <circle cx="0" cy="0" r="210" fill="none" stroke="#D42918" stroke-width="2" opacity="0.35"/>
    <circle cx="0" cy="0" r="270" fill="none" stroke="#D42918" stroke-width="1.5" opacity="0.2"/>
  </g>
  <!-- Microphone -->
  <g transform="translate(600,290)">
    <rect x="-24" y="-55" width="48" height="80" rx="24" fill="#D42918" opacity="0.15"/>
    <rect x="-24" y="-55" width="48" height="80" rx="24" fill="none" stroke="white" stroke-width="3"/>
    <path d="M-42 12 Q-42 58 0 58 Q42 58 42 12" fill="none" stroke="white" stroke-width="3"/>
    <line x1="0" y1="58" x2="0" y2="80" stroke="white" stroke-width="3"/>
    <line x1="-18" y1="80" x2="18" y2="80" stroke="white" stroke-width="3"/>
  </g>
  <!-- Accent bar -->
  <rect x="0" y="0" width="5" height="630" fill="#D42918"/>
</svg>